<!doctype html>

<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sleep Outside | Checkout</title>

  <link rel="stylesheet" href="../css/style.css" />

  <script src="../js/checkout.js" type="module"></script>
</head>

<body>
  <header class="divider" id="main-header">
  </header>

  <main class="divider">
    <section class="checkout">
      <h2>Review & Place your Order</h2>

      <form id="checkout-form">
        <fieldset>
          <legend>Customer Information</legend>

          <label for="firstName">First Name</label>
          <input id="firstName" name="firstName" type="text" required>

          <label for="lastName">Last Name</label>
          <input id="lastName" name="lastName" type="text" required>
        </fieldset>

        <fieldset>
          <legend>Shipping Address</legend>

          <label for="street">Street Address</label>
          <input id="street" name="street" type="text" required>

          <label for="city">City</label>
          <input id="city" name="city" type="text" required>

          <label for="state">State</label>
          <input id="state" name="state" type="text" required>

          <label for="zip">Zip Code</label>
          <input id="zip" name="zip" type="text" required>
        </fieldset>

        <fieldset>
          <legend>Payment</legend>

          <label for="cardNumber">Credit Card Number</label>
          <input id="cardNumber" name="cardNumber" type="text" required>

          <label for="expiration">Expiration Date</label>
          <input id="expiration" name="expiration" type="text" placeholder="MM/YY" required>

          <label for="securityCode">Security Code</label>
          <input id="securityCode" name="securityCode" type="text" required>
        </fieldset>

        <button type="submit">Checkout</button>
      </form>

      <aside class="order-summary">
        <h3>Order Summary</h3>

        <p class="summary-subtotal"></p>
        <p class="summary-tax"></p>
        <p class="summary-shipping"></p>
        <p class="summary-total"></p>
      </aside>
    </section>
  </main>

  <footer id="main-footer">
  </footer>

</body>

</html>
